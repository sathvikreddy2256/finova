services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: finova
      MYSQL_ROOT_PASSWORD: change-me
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  backend:
    build:
      context: ./backend
    depends_on:
      - mysql
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/finova?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: change-me
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: replace-with-a-long-random-secret-at-least-32-characters
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

  ai-service:
    build:
      context: ./ai-service
    environment:
      PORT: 8001
      AI_CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: http://localhost:8080/api
        REACT_APP_AI_BASE_URL: http://localhost:8001
    depends_on:
      - backend
      - ai-service
    ports:
      - "3000:80"

volumes:
  mysql_data:
