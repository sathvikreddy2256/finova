# =============================================
# Finova — Spring Boot Application Config
# =============================================

# Server port
server.port=${PORT:8080}

# ─── MySQL Database ────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/finova?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT Secret ────────────────────────────
# Must be at least 256 bits (32 characters) for HS256
jwt.secret=${JWT_SECRET:finova-super-secret-key-for-local-dev-only-please-change}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── CORS ──────────────────────────────────
# Comma-separated origins for frontend(s)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ─── Logging ───────────────────────────────
logging.level.com.finova=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:WARN}
